<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIAH - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c0a09;
      color: #e7e5e4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .orb {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #34d399, #059669, #065f46);
      margin: 0 auto 1.5rem;
      animation: pulse 3s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(52, 211, 153, 0.3);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #fafaf9;
    }
    p {
      font-size: 0.875rem;
      color: #a8a29e;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: #059669;
      color: white;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #047857; }
  </style>
</head>
<body>
  <div class="container">
    <div class="orb"></div>
    <h1>You're offline</h1>
    <p>AIAH is waiting for you to reconnect. Your data is safe and will sync once you're back online.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
